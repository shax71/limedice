<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>Lime Dice — Marketing site UI kit</title>
<link rel="stylesheet" href="kit.css">
<link rel="stylesheet" href="site.css">
<link rel="icon" href="../../assets/logo-mark.svg">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div id="app" data-screen-label="01 Home"></div>

<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function HomePage({ onNav }) {
  return (
    <>
      <Hero treatment="bold" onNav={onNav} />
      <ServicePillars onNav={onNav} />
      <QuoteStrip />
      <WritingTeaser onNav={onNav} />
    </>
  );
}

function App() {
  const [page, setPage] = useState(() => localStorage.getItem('ld_page') || 'home');

  const onNav = (p) => {
    setPage(p);
    localStorage.setItem('ld_page', p);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  useEffect(() => {
    // re-run icons after every render
    if (window.lucide) window.lucide.createIcons();
  });

  const labels = { home:'01 Home', services:'02 Services', writing:'03 Writing', about:'04 About', contact:'05 Contact' };

  return (
    <div className="site" data-screen-label={labels[page]}>
      <TopNav page={page} onNav={onNav} />
      <main>
        {page === 'home'     && <HomePage onNav={onNav} />}
        {page === 'services' && <ServicesPage onNav={onNav} />}
        {page === 'writing'  && <WritingPage />}
        {page === 'about'    && <AboutPage onNav={onNav} />}
        {page === 'contact'  && <ContactPage />}
      </main>
      <Footer onNav={onNav} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
