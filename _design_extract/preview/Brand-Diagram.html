<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Brand — Diagram style</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 22px; height: 220px; display: flex; flex-direction: column; gap: 10px; }
  svg { width: 100%; flex: 1; }
  .foot { font-family: var(--font-mono); font-size: 10px; color: #857D72; }
</style>
</head>
<body>
<div class="card">
  <svg viewBox="0 0 660 160" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#042C53"/>
      </marker>
      <marker id="a-weak" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#B8B0A4"/>
      </marker>
    </defs>
    <!-- nodes -->
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#042C53">
      <rect x="10" y="40" width="130" height="64" fill="#fff" stroke="#042C53" stroke-width="1.5" rx="4"/>
      <text x="75" y="68" text-anchor="middle" font-weight="600">EHR / PAS</text>
      <text x="75" y="86" text-anchor="middle" font-size="10" fill="#524A42">FHIR R4</text>

      <!-- highlighted node (lime) -->
      <rect x="210" y="30" width="150" height="84" fill="#EAF6E2" stroke="#042C53" stroke-width="1.5" rx="4"/>
      <rect x="210" y="30" width="4" height="84" fill="#74F443"/>
      <text x="285" y="60" text-anchor="middle" font-weight="600">Shared Care Record</text>
      <text x="285" y="78" text-anchor="middle" font-size="10" fill="#524A42">FHIR facade</text>
      <text x="285" y="94" text-anchor="middle" font-size="10" fill="#524A42">consent + audit</text>

      <rect x="430" y="40" width="130" height="64" fill="#fff" stroke="#042C53" stroke-width="1.5" rx="4"/>
      <text x="495" y="68" text-anchor="middle" font-weight="600">GP Connect</text>
      <text x="495" y="86" text-anchor="middle" font-size="10" fill="#524A42">HL7 v2 + FHIR</text>

      <!-- legacy (terracotta) -->
      <rect x="285" y="128" width="150" height="24" fill="#FAF7F2" stroke="#D4765A" stroke-width="1.5" rx="4" stroke-dasharray="4 3"/>
      <text x="360" y="144" text-anchor="middle" fill="#B85A3E" font-size="10">legacy MIG — sunset 2026</text>
    </g>
    <!-- flows -->
    <line x1="140" y1="72" x2="208" y2="72" stroke="#042C53" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="362" y1="72" x2="428" y2="72" stroke="#042C53" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="360" y1="114" x2="360" y2="128" stroke="#B8B0A4" stroke-width="1.2" marker-end="url(#a-weak)" stroke-dasharray="3 3"/>
  </svg>
  <div class="foot">Navy boxes · mono labels · lime stripe on the element under discussion · terracotta dashed for legacy.</div>
</div>
</body></html>
