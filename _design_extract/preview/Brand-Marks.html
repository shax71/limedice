<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Brand — Marks</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px; height: 170px; display: flex; align-items: center; gap: 36px; }
  .p { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .p .cap { font-family: var(--font-mono); font-size: 10px; color: #857D72; text-align: center; }
  .mark-box { width: 88px; height: 88px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="card">
  <div class="p">
    <div class="mark-box"><img src="../assets/logo-mark.svg" width="72" height="72" alt=""></div>
    <span class="cap">logo-mark.svg<br>favicon / avatar</span>
  </div>
  <div class="p">
    <img src="../assets/logo-mono.svg" height="44" alt="[lime.dice]">
    <span class="cap">logo-mono.svg<br>developer-oriented secondary</span>
  </div>
  <div class="p" style="margin-left:auto;text-align:left;align-items:flex-start;max-width:260px">
    <div style="font-family:var(--font-sans);font-size:13px;line-height:1.5;color:#042C53">The dice dot hints at the name without being literal. Avoid medical crosses, heartbeats, pills, caducei, DNA helices, or "connectivity" globes.</div>
  </div>
</div>
</body></html>
