<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Type — Mono</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 24px; height: 160px; display: flex; flex-direction: column; gap: 10px; }
  .mono-row { display: flex; gap: 12px; align-items: center; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 13px; color: #042C53; }
  .chip { background: #EDE8E0; color: #042C53; padding: 4px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .block { background: #042C53; color: #EDE8E0; padding: 12px 14px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.6; }
  .k { color: #74F443; } .s { color: #D4765A; } .c { color: #857D72; }
  .foot { font-family: var(--font-mono); font-size: 10px; color: #857D72; margin-top: auto; }
</style>
</head>
<body>
<div class="card">
  <div class="mono-row">
    <span class="chip">SNOMED 387517004</span>
    <span class="chip">FHIR/Observation</span>
    <span class="chip">NHS 943 476 5919</span>
  </div>
  <div class="block">
<span class="c">// lime / navy / terracotta syntax highlighting</span>
<span class="k">const</span> resource = { code: <span class="s">"loinc:85354-9"</span> };</div>
  <div class="foot">JetBrains Mono · 500 · reserved for technical identifiers + code</div>
</div>
</body></html>
