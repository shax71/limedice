<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Components — Navigation</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 0; height: 140px; background: #fff; border-bottom: 1px solid #EDE8E0; }
  .nav { display: flex; align-items: center; padding: 14px 24px; border-bottom: 1px solid #EDE8E0; background: #fff; }
  .brand { display: flex; align-items: center; gap: 8px; font-family: var(--font-sans); font-weight: 600; font-size: 16px; color: #042C53; letter-spacing: -0.01em; }
  .mark { width: 10px; height: 10px; background: #74F443; transform: rotate(8deg); border-radius: 2px; }
  .links { display: flex; gap: 20px; margin-left: 40px; font-size: 13px; }
  .links a { color: #042C53; border-bottom: 2px solid transparent; padding: 4px 0; text-decoration: none; }
  .links a.active { border-bottom-color: #74F443; }
  .links a:hover { border-bottom-color: #74F443; }
  .cta { margin-left: auto; display: flex; gap: 8px; }
  .btn { font-family: var(--font-sans); font-size: 13px; padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; }
  .btn-primary { background: #74F443; color: #042C53; font-weight: 500; }
  .btn-ghost { background: transparent; color: #042C53; border: 1px solid #042C53; }
  .foot { font-family: var(--font-mono); font-size: 10px; color: #857D72; padding: 10px 24px; }
</style>
</head>
<body>
<div class="card">
  <div class="nav">
    <div class="brand"><span class="mark"></span>Lime Dice</div>
    <div class="links">
      <a href="#" class="active">Home</a>
      <a href="#">Services</a>
      <a href="#">Writing</a>
      <a href="#">About</a>
    </div>
    <div class="cta">
      <button class="btn btn-ghost">Book a call</button>
      <button class="btn btn-primary">Get in touch</button>
    </div>
  </div>
  <div class="foot">White bg · navy type · lime underline on active + hover · sticky with --shadow-sm when pinned</div>
</div>
</body></html>
