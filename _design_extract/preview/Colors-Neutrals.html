<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 20px; height: 150px; display: flex; flex-direction: column; gap: 10px; }
  .ramp { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; flex: 1; }
  .sw { border-radius: 8px; padding: 8px 10px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(0,0,0,0.04); }
  .sw .lbl { font-family: var(--font-mono); font-size: 10px; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
</style>
</head>
<body>
<div class="card">
  <div class="ramp">
    <div class="sw" style="background:#2A241E; color:#EDE8E0"><span class="lbl">900</span><span class="hex">#2A241E</span></div>
    <div class="sw" style="background:#524A42; color:#EDE8E0"><span class="lbl">700</span><span class="hex">#524A42</span></div>
    <div class="sw" style="background:#857D72; color:#FFFFFF"><span class="lbl">500</span><span class="hex">#857D72</span></div>
    <div class="sw" style="background:#B8B0A4; color:#2A241E"><span class="lbl">300</span><span class="hex">#B8B0A4</span></div>
    <div class="sw" style="background:#D8D2C8; color:#2A241E"><span class="lbl">200</span><span class="hex">#D8D2C8</span></div>
    <div class="sw" style="background:#EDE8E0; color:#2A241E"><span class="lbl">100</span><span class="hex">#EDE8E0</span></div>
    <div class="sw" style="background:#0A1628; color:#EDE8E0"><span class="lbl">ink</span><span class="hex">#0A1628</span></div>
  </div>
  <div class="meta-label">Warm stone family — beige undertone pairs with terracotta.</div>
</div>
</body></html>
