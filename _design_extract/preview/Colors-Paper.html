<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Colors — Paper</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 20px; height: 150px; display: flex; flex-direction: column; gap: 10px; }
  .row3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 1; }
  .sw { border-radius: 10px; padding: 14px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #D8D2C8; }
  .sw .name { font-weight: 600; font-size: 13px; color: #042C53; }
  .sw .hex  { font-family: var(--font-mono); font-size: 11px; color: #524A42; }
</style>
</head>
<body>
<div class="card">
  <div class="row3">
    <div class="sw" style="background:#FFFFFF"><span class="name">Paper</span><span class="hex">#FFFFFF</span></div>
    <div class="sw" style="background:#EAF6E2"><span class="name">Paper · Mint</span><span class="hex">#EAF6E2</span></div>
    <div class="sw" style="background:#FAF7F2"><span class="name">Paper · Warm</span><span class="hex">#FAF7F2</span></div>
  </div>
  <div class="meta-label">Alternate paper + mint to create section rhythm without dividers.</div>
</div>
</body></html>
