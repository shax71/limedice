<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 24px; height: 180px; display: flex; flex-direction: column; gap: 4px; }
  .hero { font-family: var(--font-sans); font-weight: 700; font-size: 52px; line-height: 1.05; letter-spacing: -0.025em; color: #042C53; }
  .lead { font-family: var(--font-sans); font-weight: 400; font-size: 17px; line-height: 1.55; color: #524A42; max-width: 560px; margin-top: 8px; }
  .foot { margin-top: auto; display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: #857D72; }
</style>
</head>
<body>
<div class="card">
  <div class="hero">Health systems,<br>joined up properly.</div>
  <div class="lead">Inter 400, 17 / 1.55. Lead paragraphs stay under 680px to keep a comfortable reading measure.</div>
  <div class="foot"><span>Inter · 700 · 52/57 · −0.025em</span><span>Hero / display</span></div>
</div>
</body></html>
