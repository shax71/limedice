<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Spacing — Scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 20px; height: 170px; display: flex; flex-direction: column; gap: 8px; }
  .bars { display: flex; align-items: flex-end; gap: 8px; flex: 1; }
  .bar { background: #EAF6E2; border-bottom: 2px solid #042C53; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; font-family: var(--font-mono); font-size: 10px; color: #042C53; padding: 2px 0; border-radius: 2px 2px 0 0; }
  .bar .px { color: #524A42; font-size: 9px; }
  .foot { font-family: var(--font-mono); font-size: 10px; color: #857D72; }
</style>
</head>
<body>
<div class="card">
  <div class="bars">
    <div class="bar" style="width:18px;height:4px"><span>1</span></div>
    <div class="bar" style="width:24px;height:8px"><span>2</span></div>
    <div class="bar" style="width:30px;height:12px"><span>3</span></div>
    <div class="bar" style="width:36px;height:16px"><span>4</span></div>
    <div class="bar" style="width:44px;height:24px"><span>6</span></div>
    <div class="bar" style="width:52px;height:32px"><span>8</span></div>
    <div class="bar" style="width:60px;height:48px"><span>12</span></div>
    <div class="bar" style="width:70px;height:64px"><span>16</span></div>
    <div class="bar" style="width:86px;height:84px"><span>24</span><span class="px">96px</span></div>
    <div class="bar" style="width:100px;height:100px"><span>32</span><span class="px">128px</span></div>
  </div>
  <div class="foot">4px base unit · --space-1 through --space-32</div>
</div>
</body></html>
